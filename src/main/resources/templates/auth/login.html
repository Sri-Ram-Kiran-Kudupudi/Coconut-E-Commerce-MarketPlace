<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::title}, ~{::content})}">
<head>
    <title>Login - Coconut Marketplace</title>
</head>
<body>
    <div th:fragment="content" class="full-height-center">
        <div class="auth-card">
            <!-- Session Expired Notification Banner -->
            <div th:if="${expiredMessage}" class="alert alert-warning text-center border-0 shadow-sm mb-4" style="background-color: #FFF3CD; color: #856404; border-radius: 8px;">
                <span th:text="${expiredMessage}">Your session has expired. Please log in again.</span>
            </div>
            
            <!-- Standard Logout / Info Banner -->
            <div th:if="${infoMessage}" class="alert alert-info text-center border-0 shadow-sm mb-4" style="background-color: #D1ECF1; color: #0C5460; border-radius: 8px;">
                <span th:text="${infoMessage}">Logged out successfully.</span>
            </div>

            <!-- Login Form Card -->
            <div class="custom-card">
                <div class="text-center mb-4">
                    <span style="font-size: 48px; display: block;">🥥</span>
                    <h2 class="mt-2" style="font-weight: 700; color: var(--primary-blue); font-size: 24px;">Coconut Marketplace</h2>
                    <p class="text-muted" style="font-size: 13px;">Login to buy or sell coconut products</p>
                </div>

                <!-- Backend Validation / Global Error Alert -->
                <div th:if="${errorMessage}" class="alert alert-danger py-2 px-3 mb-3" style="font-size: 13px; border-radius: 8px;" th:text="${errorMessage}">
                    Invalid email or password.
                </div>

                <form th:action="@{/login}" method="post" class="needs-validation" novalidate>
                    <!-- Email Field -->
                    <div class="mb-3">
                        <label for="email" class="form-label" style="font-weight: 500; color: var(--text-dark);">Email Address</label>
                        <input type="email" name="email" id="email" class="form-input" placeholder="name@example.com" required>
                        <div class="invalid-feedback">Please enter a valid email address.</div>
                    </div>

                    <!-- Password Field -->
                    <div class="mb-4">
                        <label for="password" class="form-label" style="font-weight: 500; color: var(--text-dark);">Password</label>
                        <input type="password" name="password" id="password" class="form-input" placeholder="••••••••" minlength="6" required>
                        <div class="invalid-feedback">Password must be at least 6 characters.</div>
                    </div>

                    <!-- Actions -->
                    <button type="submit" class="btn-primary-custom w-100 mb-3">Login</button>
                    
                    <div class="text-center">
                        <span class="text-muted" style="font-size: 13px;">New to the marketplace? </span>
                        <a th:href="@{/select-role}" style="color: var(--primary-blue); font-weight: 600; text-decoration: none; font-size: 13px;">Register Here</a>
                    </div>
                </form>
            </div>
        </div>
        
        <script>
            // Form validation
            (() => {
                'use strict'
                const forms = document.querySelectorAll('.needs-validation')
                Array.from(forms).forEach(form => {
                    form.addEventListener('submit', event => {
                        if (!form.checkValidity()) {
                            event.preventDefault()
                            event.stopPropagation()
                        }
                        form.classList.add('was-validated')
                    }, false)
                })
            })()
        </script>
    </div>
</body>
</html>
