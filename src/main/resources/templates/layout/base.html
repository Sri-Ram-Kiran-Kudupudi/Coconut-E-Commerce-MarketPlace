<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSRF Tokens for AJAX Calls -->
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    
    <title th:replace="${title}">Coconut Marketplace</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <!-- Header Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom navbar-light">
        <div class="container-fluid px-lg-3 px-3">
            <a class="navbar-brand navbar-brand-custom" th:href="@{/}">
                <span>🥥</span> Coconut Marketplace
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center">
                    <!-- Anonymous Guest Links -->
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link" th:href="@{/login}">Login</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link" th:href="@{/select-role}">Register</a>
                    </li>
                    
                    <!-- Buyer Role Links -->
                    <li class="nav-item" sec:authorize="hasRole('BUYER')">
                        <a class="nav-link" th:href="@{/buyer/dashboard}">Home</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('BUYER')">
                        <a class="nav-link d-inline-flex align-items-center me-3" th:href="@{/buyer/cart}">
                            <span class="position-relative d-inline-block">
                                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" class="bi bi-cart3 me-1" viewBox="0 0 16 16" style="color: var(--text-dark); vertical-align: middle;">
                                    <path d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .49.598l-1 5a.5.5 0 0 1-.465.401l-9.397.472L4.415 11H13a.5.5 0 0 1 0 1H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5zM3.102 4l.84 4.479 9.144-.459L13.89 4H3.102zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
                                </svg>
                                <span class="cart-badge" 
                                      th:text="${session.cartCount != null ? session.cartCount : 0}">0</span>
                            </span>
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('BUYER')">
                        <a class="nav-link" th:href="@{/buyer/orders}">My Orders</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('BUYER')">
                        <a class="nav-link" th:href="@{/buyer/profile}">Profile</a>
                    </li>
                    
                    <!-- Seller Role Links -->
                    <li class="nav-item" sec:authorize="hasRole('SELLER')">
                        <a class="nav-link" th:href="@{/seller/dashboard}">Dashboard</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('SELLER')">
                        <a class="nav-link" th:href="@{/seller/products}">Products</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('SELLER')">
                        <a class="nav-link" th:href="@{/seller/orders}">Orders</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('SELLER')">
                        <a class="nav-link" th:href="@{/seller/profile}">Profile</a>
                    </li>
                    
                    <!-- Authenticated User Logout Link -->
                    <li class="nav-item ms-lg-3" sec:authorize="isAuthenticated()">
                        <button type="button" class="btn btn-sm btn-outline-danger px-3 py-1.5" data-bs-toggle="modal" data-bs-target="#logoutModal" style="border-radius: 8px; font-weight: 600; transition: all 0.2s ease;">
                            Logout
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Injection -->
    <div th:replace="${content}"></div>

    <!-- Logout Confirmation Modal -->
    <div sec:authorize="isAuthenticated()" class="modal fade" id="logoutModal" tabindex="-1" aria-labelledby="logoutModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius: 16px; border: none; box-shadow: var(--shadow-lg); background-color: var(--card-bg);">
                <div class="modal-header" style="border-bottom: 1px solid var(--border-color); padding: 20px;">
                    <h5 class="modal-title" id="logoutModalLabel" style="font-weight: 700; color: var(--text-dark);">Confirm Logout</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" style="padding: 24px; color: var(--text-grey); font-size: 15px;">
                    Are you sure you want to logout?
                </div>
                <div class="modal-footer" style="border-top: 1px solid var(--border-color); padding: 16px 20px;">
                    <button type="button" class="btn btn-outline-secondary px-4 py-2" data-bs-dismiss="modal" style="border-radius: 8px; font-weight: 600;">Cancel</button>
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-danger px-4 py-2" style="border-radius: 8px; font-weight: 600; background-color: var(--error-red); border: none;">Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notifications Container -->
    <div class="toast-container-custom" id="toastContainer">
        <!-- Render Success Messages -->
        <div class="toast-custom" th:if="${successMessage}" style="background-color: var(--success-green);">
            <span th:text="${successMessage}">Success message</span>
        </div>
        <!-- Render Failures -->
        <div class="toast-custom" th:if="${error}" style="background-color: var(--error-red);">
            <span th:text="${error}">Error message</span>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Auto-Dismiss Toasts JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toasts = document.querySelectorAll('.toast-custom');
            toasts.forEach(toast => {
                setTimeout(() => {
                    toast.style.transition = 'opacity 0.5s ease';
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 500);
                }, 4000);
            });
        });
    </script>
</body>
</html>
