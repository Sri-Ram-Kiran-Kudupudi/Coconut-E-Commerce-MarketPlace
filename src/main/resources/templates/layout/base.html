<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSRF Tokens for AJAX Calls -->
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    
    <title th:replace="${title}">Coconut Marketplace</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <!-- Header Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom navbar-light">
        <div class="container">
            <a class="navbar-brand navbar-brand-custom" th:href="@{/}">
                <span>🥥</span> Coconut Marketplace
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center">
                    <!-- Anonymous Guest Links -->
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link" th:href="@{/login}">Login</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link" th:href="@{/select-role}">Register</a>
                    </li>
                    
                    <!-- Buyer Role Links -->
                    <li class="nav-item" sec:authorize="hasRole('BUYER')">
                        <a class="nav-link" th:href="@{/buyer/dashboard}">Browse Products</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('BUYER')">
                        <a class="nav-link" th:href="@{/buyer/orders}">My Orders</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('BUYER')">
                        <a class="nav-link" th:href="@{/buyer/profile}">Profile 👤</a>
                    </li>
                    
                    <!-- Seller Role Links -->
                    <li class="nav-item" sec:authorize="hasRole('SELLER')">
                        <a class="nav-link" th:href="@{/seller/dashboard}">Dashboard</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('SELLER')">
                        <a class="nav-link" th:href="@{/seller/products}">Products</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('SELLER')">
                        <a class="nav-link" th:href="@{/seller/orders}">Orders</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('SELLER')">
                        <a class="nav-link" th:href="@{/seller/profile}">Profile 👤</a>
                    </li>
                    
                    <!-- Authenticated User Logout Link -->
                    <li class="nav-item ms-lg-3" sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Injection -->
    <div th:replace="${content}"></div>

    <!-- Toast Notifications Container -->
    <div class="toast-container-custom" id="toastContainer">
        <!-- Render Success Messages -->
        <div class="toast-custom" th:if="${successMessage}" style="background-color: var(--success-green);">
            <span th:text="${successMessage}">Success message</span>
        </div>
        <!-- Render Failures -->
        <div class="toast-custom" th:if="${error}" style="background-color: var(--error-red);">
            <span th:text="${error}">Error message</span>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Auto-Dismiss Toasts JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toasts = document.querySelectorAll('.toast-custom');
            toasts.forEach(toast => {
                setTimeout(() => {
                    toast.style.transition = 'opacity 0.5s ease';
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 500);
                }, 4000);
            });
        });
    </script>
</body>
</html>
